<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot E-commerce</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 400px; height: 600px; background: white; border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .chat-header { background: #2563eb; color: white; padding: 16px 20px; font-size: 16px; font-weight: bold; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
        .message.user { background: #2563eb; color: white; align-self: flex-end; border-radius: 12px 12px 2px 12px; }
        .message.bot { background: #f0f0f0; color: #333; align-self: flex-start; border-radius: 12px 12px 12px 2px; }
        .chat-input { display: flex; padding: 12px; border-top: 1px solid #eee; gap: 8px; }
        .chat-input input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 24px; outline: none; font-size: 14px; }
        .chat-input button { background: #2563eb; color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 18px; }
        .typing { color: #999; font-size: 13px; font-style: italic; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">🛍️ Assistant Boutique</div>
        <div class="chat-messages" id="messages">
            <div class="message bot">Bonjour ! Je suis votre assistant. Comment puis-je vous aider aujourd'hui ?</div>
        </div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Écrivez votre message..." onkeypress="handleKey(event)"/>
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const messages = document.getElementById('messages');
            const text = input.value.trim();
            if (!text) return;

            messages.innerHTML += `<div class="message user">${text}</div>`;
            input.value = '';
            messages.innerHTML += `<div class="message bot typing" id="typing">En train d'écrire...</div>`;
            messages.scrollTop = messages.scrollHeight;

            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });

            const data = await response.json();
            document.getElementById('typing').remove();
            messages.innerHTML += `<div class="message bot">${data.response}</div>`;
            messages.scrollTop = messages.scrollHeight;
        }

        function handleKey(e) {
            if (e.key === 'Enter') sendMessage();
        }
    </script>
</body>
</html>
